app = "nano-terminal-portfolio"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 2222
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # External port 22 -> container port 2222, so visitors connect with the
  # clean `ssh nano@nano-terminal-portfolio.fly.dev` (no -p needed).
  [[services.ports]]
    port = 22
